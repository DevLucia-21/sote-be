spring:
  security:
    debug: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
      jdbc:
        time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  cloud:
    gcp:
      storage:
        project-id: sote-push
        bucket: sote-profile-image
        credentials:
          location: ${PROFILE_GCP_CREDENTIALS}
        auto-create-files: false

      ocr-storage:
        project-id: sote-push
        bucket: sote-diary-uploads-2025
        credentials:
          location: ${OCR_GCP_CREDENTIALS}

ai:
  analysis:
    base-url: ${AI_ANALYSIS_BASE_URL:https://sote-ai.onrender.com}
    endpoint: ${AI_ANALYSIS_ENDPOINT:/api/analysis/result}
    timeout-seconds: ${AI_ANALYSIS_TIMEOUT:60}

fastapi:
  stt-url: ${FASTAPI_STT_URL:https://sote-ai.onrender.com/ai/stt/transcribe}
  ocr:
    url: ${FASTAPI_OCR_URL:https://sote-ai.onrender.com/ocr/preview}

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRE:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRE:86400000}

spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}

gcp:
  vision:
    credentials:
      location: ${OCR_GCP_CREDENTIALS}

logging:
  level:
    root: INFO
    com.fluxion.sote: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
    org.springframework.security: INFO
