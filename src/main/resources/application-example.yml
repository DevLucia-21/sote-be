fastapi:
stt-url: ${FASTAPI_STT_URL}

spring:
  security:
    debug: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none  # Flyway로 스키마 관리
    show-sql: false
    properties:
      hibernate:
        format_sql: true
      jdbc:
        time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  cloud:
    gcp:
      storage:
        project-id: ${GCP_PROJECT_ID}
        bucket: ${GCP_BUCKET}
        credentials:
          location: ${GCP_CREDENTIALS_LOCATION}
        auto-create-files: false

ai:
  analysis:
    base-url: ${AI_ANALYSIS_BASE_URL}
    endpoint: /api/analysis/result
    timeout-seconds: 60

jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: 3600000
  refresh-expiration-ms: 86400000

spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}

logging:
  level:
    root: INFO
    com.fluxion.sote: INFO
    org.springframework.web: INFO
    org.flywaydb: INFO
    org.springframework.security: INFO